name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'debian-trixie/**'
      - 'ubuntu-noble/**'

jobs:
  
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      
      matrix:
        include:
          - directory: debian-trixie
            tag_name: trixie
            is_global_latest: false
          
          - directory: ubuntu-noble
            tag_name: noble
            is_global_latest: true # Will apply to global :latest tag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Version number from Dockerfile
        id: get_version
        run: |
          VERSION=$(grep -i 'LABEL Version=' ./${{ matrix.directory }}/Dockerfile | head -n 1 | cut -d'"' -f2)
          
          if [ -z "$VERSION" ]; then
            VERSION="4.274.1.999"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/do-agent
          tags: |
            # Clean tag with release (e.g. do-agent:noble-0.0.0.0)
            type=raw,value=${{ matrix.tag_name }}-${{ steps.get_version.outputs.version }}
            
            # Sepcific latest tag (e.g. do-agent:noble-latest)
            type=raw,value=${{ matrix.tag_name }}-latest
            
            # Global latest (only for global latest, e.g. do-agent:latest)
            type=raw,value=latest,enable=${{ matrix.is_global_latest }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.directory }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max