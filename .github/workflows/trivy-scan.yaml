name: Run Trivy Scan

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push on DockerHub"]
    types:
      - completed

permissions:
  contents: write

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup workspace directories
        run: |
          mkdir -p security-reports

      - name: Scan Ubuntu Noble Image (Temp JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'docker.io/karfee111/do-agent:noble-latest'
          format: 'json'
          output: 'noble-temp.json'
          severity: 'HIGH,CRITICAL'

      - name: Scan Ubuntu Noble Image (Table TXT)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'docker.io/karfee111/do-agent:noble-latest'
          format: 'table'
          output: 'security-reports/noble-vulns.txt'
          severity: 'HIGH,CRITICAL'

      - name: Scan Debian Trixie Image (Temp JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'docker.io/karfee111/do-agent:trixie-latest'
          format: 'json'
          output: 'trixie-temp.json'
          severity: 'HIGH,CRITICAL'

      - name: Scan Debian Trixie Image (Table TXT)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'docker.io/karfee111/do-agent:trixie-latest'
          format: 'table'
          output: 'security-reports/trixie-vulns.txt'
          severity: 'HIGH,CRITICAL'

      - name: Generate Security Metadata JSON
        run: |
          NOBLE_COUNT=$(jq '[.Results[].Vulnerabilities // [] | length] | add' noble-temp.json || echo 0)
          TRIXIE_COUNT=$(jq '[.Results[].Vulnerabilities // [] | length] | add' trixie-temp.json || echo 0)

          [ -z "$NOBLE_COUNT" ] || [ "$NOBLE_COUNT" = "null" ] && NOBLE_COUNT=0
          [ -z "$TRIXIE_COUNT" ] || [ "$TRIXIE_COUNT" = "null" ] && TRIXIE_COUNT=0

          jq -n \
            --arg noble "$NOBLE_COUNT" \
            --arg trixie "$TRIXIE_COUNT" \
            '{noble_cves: $noble, trixie_cves: $trixie}' > .github/workflows/security-metadata.json

      - name: Commit and Push Reports and Metadata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update security reports and metadata"
          file_pattern: 'security-reports/*.json .github/workflows/security-metadata.json'